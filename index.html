<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Đang Bảo Trì</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px;
}

.icon{
    font-size:80px;
    animation:spin 5s linear infinite;
}

h1{
    margin-top:20px;
    font-size:42px;
}

p{
    margin-top:15px;
    font-size:18px;
    color:#cbd5e1;
    line-height:1.6;
}

.time{
    margin-top:25px;
    font-size:22px;
    color:#38bdf8;
    font-weight:bold;
}

.footer{
    margin-top:40px;
    color:#94a3b8;
    font-size:14px;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="icon">⚙️</div>

    <h1>Website Đang Bảo Trì</h1>

    <p>
        Chúng tôi đang tiến hành nâng cấp hệ thống để mang đến trải nghiệm tốt hơn.
        Xin lỗi vì sự bất tiện này.
    </p>

    <div class="time">
        Vui lòng quay lại sau.
    </div>

    <div class="footer">
        © 2026 - Cảm ơn bạn đã kiên nhẫn.
    </div>
</div>

</body>
</html>
